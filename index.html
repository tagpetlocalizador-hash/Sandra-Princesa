<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Pet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#e8f5e9;
padding:30px;
}

.card{
max-width:450px;
margin:auto;
background:white;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

img{
width:220px;
height:220px;
border-radius:50%;
border:5px solid #4CAF50;
object-fit:cover;
margin-bottom:20px;
}

h1{
color:#2E7D32;
margin-bottom:15px;
}

p{
margin-bottom:10px;
font-size:18px;
}

.botao{
display:block;
margin:15px auto;
padding:15px;
width:100%;
border-radius:10px;
text-decoration:none;
font-size:20px;
font-weight:bold;
}

.ligar{
background:#2196F3;
color:white;
}

.whats{
background:#25D366;
color:white;
}

</style>

</head>


<body>


<div class="card">


<img src="princesa.jpeg">


<h1 id="nomePet">
Carregando...
</h1>


<p>
<strong>
Se encontrou este pet, entre em contato.
</strong>
</p>


<p>
<b>Tutor:</b>
<span id="tutor">
Carregando...
</span>
</p>


<p>
<b>Telefone:</b>
<span id="telefone">
Carregando...
</span>
</p>



<a class="botao ligar" id="btnLigar">
📞 Ligar
</a>


<a class="botao whats" id="btnWhats">
💬 WhatsApp
</a>



</div>



<script>


// LINK DO SEU APPS SCRIPT

const urlEmail = "https://script.google.com/macros/s/AKfycbxeFvRX97GEuxPC39cDdb0jyZPzj9URxi8O57HsXMPLPcemWhcWkPKrt53lgj_Bt6WF/exec";




// ==============================
// BUSCAR DADOS DO PET
// ==============================


fetch(urlEmail + "?acao=dados")


.then(response => response.text())


.then(texto => {


console.log("Resposta Apps Script:", texto);



let dados = JSON.parse(texto);



document.getElementById("nomePet").innerHTML =
"🐾 " + dados.nome;



document.getElementById("tutor").innerHTML =
dados.tutor;



let telefone =
dados.telefone.replace(/\D/g,'');



document.getElementById("telefone").innerHTML =
dados.telefone;



document.getElementById("btnLigar").href =
"tel:+55" + telefone;



document.getElementById("btnWhats").href =
"https://wa.me/55" + telefone;



})


.catch(erro=>{


console.log("Erro dados:", erro);



document.getElementById("nomePet").innerHTML =
"Erro ao carregar pet";


});






// ==============================
// ENVIAR LOCALIZAÇÃO
// ==============================


if(navigator.geolocation){


navigator.geolocation.getCurrentPosition(


function(posicao){


let latitude =
posicao.coords.latitude;


let longitude =
posicao.coords.longitude;



fetch(
urlEmail+
"?lat="+latitude+
"&lon="+longitude
)



.then(()=>{

console.log("Localização enviada");

})


.catch(erro=>{

console.log("Erro localização:",erro);

});


},



function(){

console.log("Localização negada");

}


);


}



</script>


</body>

</html>
